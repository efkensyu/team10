<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">
<head>
<meta charset="UTF-8">
<title>ペット登録画面</title>
</head>
<body>
	
<form method="post" th:action="@{/register}" enctype="multipart/form-data">
	ペットの名前を入力<input type="text" name="petName" value="ポチ" />
	<br>
	ペットの画像を選択<input type="file" name="imageFile" accept="image/*" />
	<br>
	<input type="submit" value="送信" />
	
	<form method="get" th:action="@{/team10/top}">
		<input type="submit" value="トップへ戻る" />
	</form>
</form>	

</body>
</html>
